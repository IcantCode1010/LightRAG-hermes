services:
  lightrag-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: lightrag-hermes-api:local
    env_file:
      - path: .env
        required: false
    ports:
      - "${LIGHTRAG_HOST_BIND:-127.0.0.1}:${PORT:-9621}:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./data/prompts:/app/data/prompts
    environment:
      HOST: "0.0.0.0"
      PORT: "9621"
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      PROMPT_DIR: "/app/data/prompts"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_BINDING: "${LLM_BINDING:-openai}"
      LLM_BINDING_HOST: "${LLM_BINDING_HOST:-https://api.openai.com/v1}"
      LLM_BINDING_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_MODEL: "${LIGHTRAG_LLM_MODEL:-gpt-4o-mini}"
      EXTRACT_LLM_MODEL: "${LIGHTRAG_EXTRACT_LLM_MODEL:-gpt-4o-mini}"
      KEYWORD_LLM_MODEL: "${LIGHTRAG_KEYWORD_LLM_MODEL:-gpt-4o-mini}"
      QUERY_LLM_MODEL: "${LIGHTRAG_QUERY_LLM_MODEL:-gpt-4o-mini}"
      EMBEDDING_BINDING: "${EMBEDDING_BINDING:-openai}"
      EMBEDDING_BINDING_HOST: "${EMBEDDING_BINDING_HOST:-https://api.openai.com/v1}"
      EMBEDDING_BINDING_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-large}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-3072}"
      EMBEDDING_TOKEN_LIMIT: "${EMBEDDING_TOKEN_LIMIT:-8192}"
      EMBEDDING_SEND_DIM: "${EMBEDDING_SEND_DIM:-false}"
      EMBEDDING_USE_BASE64: "${EMBEDDING_USE_BASE64:-true}"
    networks:
      - hermes-net
    restart: unless-stopped

  lightrag-snapshot:
    build:
      context: .
      dockerfile: Dockerfile
    image: lightrag-hermes-api:local
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data/hermes_snapshot/rag_storage:/app/data/snapshot_rag_storage
      - ./data/hermes_snapshot/inputs:/app/data/snapshot_inputs
      - ./data/prompts:/app/data/prompts
    environment:
      HOST: "0.0.0.0"
      PORT: "9621"
      WORKING_DIR: "/app/data/snapshot_rag_storage"
      INPUT_DIR: "/app/data/snapshot_inputs"
      PROMPT_DIR: "/app/data/prompts"
      WORKSPACE: "hermes_latest"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_BINDING: "${LLM_BINDING:-openai}"
      LLM_BINDING_HOST: "${LLM_BINDING_HOST:-https://api.openai.com/v1}"
      LLM_BINDING_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_MODEL: "${LIGHTRAG_LLM_MODEL:-gpt-4o-mini}"
      EXTRACT_LLM_MODEL: "${LIGHTRAG_EXTRACT_LLM_MODEL:-gpt-4o-mini}"
      KEYWORD_LLM_MODEL: "${LIGHTRAG_KEYWORD_LLM_MODEL:-gpt-4o-mini}"
      QUERY_LLM_MODEL: "${LIGHTRAG_QUERY_LLM_MODEL:-gpt-4o-mini}"
      EMBEDDING_BINDING: "${EMBEDDING_BINDING:-openai}"
      EMBEDDING_BINDING_HOST: "${EMBEDDING_BINDING_HOST:-https://api.openai.com/v1}"
      EMBEDDING_BINDING_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-large}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-3072}"
      EMBEDDING_TOKEN_LIMIT: "${EMBEDDING_TOKEN_LIMIT:-8192}"
      EMBEDDING_SEND_DIM: "${EMBEDDING_SEND_DIM:-false}"
      EMBEDDING_USE_BASE64: "${EMBEDDING_USE_BASE64:-true}"
    networks:
      - hermes-net
    restart: unless-stopped

  lightrag-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: lightrag-hermes-mcp:local
    env_file:
      - path: env.hermes
        required: false
    ports:
      - "${LIGHTRAG_MCP_HOST_BIND:-127.0.0.1}:${LIGHTRAG_MCP_PORT:-8765}:8765"
    volumes:
      - ./data/hermes_sources:/app/data/hermes_sources
      - ./data/hermes_snapshots:/app/data/hermes_snapshots
    environment:
      LIGHTRAG_MCP_BASE_URL: "http://lightrag-api:9621"
      LIGHTRAG_MCP_SNAPSHOT_BASE_URL: "http://lightrag-snapshot:9621"
      LIGHTRAG_MCP_SOURCE_DIR: "/app/data/hermes_sources"
      LIGHTRAG_MCP_SNAPSHOT_DIR: "/app/data/hermes_snapshots"
      LIGHTRAG_MCP_ACTIVE_SNAPSHOT_FILE: "/app/data/hermes_snapshots/active.json"
      LIGHTRAG_MCP_HOST: "0.0.0.0"
      LIGHTRAG_MCP_PORT: "8765"
    depends_on:
      - lightrag-api
      - lightrag-snapshot
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-ui:
    build:
      context: .
      dockerfile: Dockerfile.hermes-ui
    image: lightrag-hermes-ui:local
    env_file:
      - path: .env
        required: false
    ports:
      - "${HERMES_UI_HOST_BIND:-127.0.0.1}:${HERMES_UI_PORT:-8787}:8787"
    volumes:
      - ./data/hermes_ui_home:/app/hermes_home
      - ./data/hermes_snapshot_archive:/app/data/hermes_snapshot_archive
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      HERMES_HOME: "/app/hermes_home"
      HERMES_UI_HOST: "0.0.0.0"
      HERMES_UI_PORT: "8787"
      HERMES_MODEL: "${HERMES_MODEL:-gpt-5.4-mini}"
      HERMES_PROVIDER: "openai-api"
      HERMES_BASE_URL: "https://api.openai.com/v1"
      HERMES_SOUL_FILE: "${HERMES_SOUL_FILE:-/app/hermes_ui/soul.md}"
      LIGHTRAG_MCP_URL: "http://lightrag-mcp:8765/mcp"
      HERMES_SNAPSHOT_ARCHIVE_DIR: "/app/data/hermes_snapshot_archive"
    depends_on:
      - lightrag-mcp
    networks:
      - hermes-net
    restart: unless-stopped

networks:
  hermes-net:
    driver: bridge
